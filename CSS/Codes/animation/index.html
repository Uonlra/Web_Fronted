<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sass Classic Demo</title>
    <link rel="stylesheet" href="hello.css">
</head>
<body>
    <main class="page-shell">
        <section class="hero">
            <p class="hero__eyebrow">Sass Demo</p>
            <h1 class="hero__title">一个经典的 Sass 练习项目</h1>
            <p class="hero__subtitle">
                这个例子演示了变量、嵌套、mixin、extend 和循环生成样式的常见写法。
            </p>
        </section>

        <section class="feature-grid">
            <article class="feature-card feature-card--1">
                <span class="feature-card__badge">01</span>
                <h2>Variables</h2>
                <p>统一管理颜色、圆角、阴影和间距，减少重复修改成本。</p>
            </article>

            <article class="feature-card feature-card--2">
                <span class="feature-card__badge">02</span>
                <h2>Nesting</h2>
                <p>把组件内部结构写在一起，层级关系更清晰，维护更直接。</p>
            </article>

            <article class="feature-card feature-card--3">
                <span class="feature-card__badge">03</span>
                <h2>Mixins</h2>
                <p>把常用的按钮、卡片、响应式逻辑提取复用，代码更干净。</p>
            </article>
        </section>

        <section class="cta-panel">
            <div>
                <p class="cta-panel__label">Classic Pattern</p>
                <h2>这就是很多 Sass 入门项目的典型结构</h2>
            </div>
            <div class="cta-panel__actions">
                <a href="#" class="btn btn--primary">查看样式</a>
                <a href="#" class="btn btn--ghost">学习 Sass</a>
            </div>
        </section>
    </main>
</body>
</html>
