<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TODO List - 纯 JS + DOM + localStorage</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f5f5f5;
      min-height: 100vh;
      padding: 40px 20px;
    }

    .container {
      max-width: 500px;
      margin: 0 auto;
      background: white;
      border-radius: 12px;
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.1);
      padding: 30px;
    }

    h1 {
      text-align: center;
      color: #333;
      margin-bottom: 24px;
      font-size: 24px;
    }

    /* 输入区域 */
    .input-group {
      display: flex;
      gap: 8px;
      margin-bottom: 20px;
    }

    .input-group input {
      flex: 1;
      padding: 10px 14px;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
    }

    .input-group input:focus {
      border-color: #4a90d9;
    }

    .input-group button {
      padding: 10px 20px;
      background: #4a90d9;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      cursor: pointer;
      transition: background 0.2s;
    }

    .input-group button:hover {
      background: #357abd;
    }

    /* 筛选按钮 */
    .filter-group {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
    }

    .filter-btn {
      padding: 6px 14px;
      border: 1px solid #e0e0e0;
      border-radius: 20px;
      background: white;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.2s;
      color: #666;
    }

    .filter-btn:hover {
      border-color: #4a90d9;
      color: #4a90d9;
    }

    .filter-btn.active {
      background: #4a90d9;
      color: white;
      border-color: #4a90d9;
    }

    /* 任务列表 */
    .todo-list {
      list-style: none;
    }

    .todo-item {
      display: flex;
      align-items: center;
      padding: 12px;
      border-bottom: 1px solid #f0f0f0;
      transition: background 0.2s;
    }

    .todo-item:hover {
      background: #fafafa;
    }

    .todo-item.completed .todo-text {
      text-decoration: line-through;
      color: #999;
    }

    .todo-item input[type="checkbox"] {
      width: 18px;
      height: 18px;
      margin-right: 12px;
      cursor: pointer;
      accent-color: #4a90d9;
    }

    .todo-text {
      flex: 1;
      font-size: 14px;
      color: #333;
    }

    .delete-btn {
      padding: 4px 10px;
      background: none;
      border: 1px solid #ff4d4f;
      border-radius: 4px;
      color: #ff4d4f;
      font-size: 12px;
      cursor: pointer;
      opacity: 0;
      transition: opacity 0.2s;
    }

    .todo-item:hover .delete-btn {
      opacity: 1;
    }

    .delete-btn:hover {
      background: #ff4d4f;
      color: white;
    }

    /* 统计 */
    .stats {
      margin-top: 16px;
      padding-top: 12px;
      border-top: 1px solid #f0f0f0;
      font-size: 13px;
      color: #999;
      display: flex;
      justify-content: space-between;
    }

    /* 空状态 */
    .empty-state {
      text-align: center;
      padding: 40px 0;
      color: #ccc;
      font-size: 14px;
    }
</style>
</head>
<body>
  <div class="container">
    <h1>TODO List</h1>

    <!-- 输入区域 -->
    <div class="input-group">
      <input type="text" id="todo-input" placeholder="输入新任务...">
      <button id="add-btn">添加</button>
    </div>

    <!-- 筛选按钮 -->
    <div class="filter-group" id="filter-group">
      <button class="filter-btn active" data-filter="all">全部</button>
      <button class="filter-btn" data-filter="active">未完成</button>
      <button class="filter-btn" data-filter="completed">已完成</button>
    </div>

    <!-- 任务列表 -->
    <ul class="todo-list" id="todo-list"></ul>

    <!-- 统计信息 -->
    <div class="stats" id="stats"></div>
  </div>

  <script src="todo-app.js"></script>
</body>
</html>
