<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OpenAI API Chat Demo</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main class="shell">
      <section class="card">
        <p class="eyebrow">OpenAI Project Assistant</p>
        <h1>把 OpenAI API 接进你的日常开发流程</h1>
        <p class="intro">
          这个页面示范的不是“聊天玩具”，而是一个适合项目开发的基础台。浏览器只请求本地服务端，再由服务端安全地调用 OpenAI。
        </p>

        <form id="chat-form" class="chat-form">
          <div class="hero-grid">
            <section class="tips">
              <p class="tips-title">常用任务模板</p>
              <div class="chip-list">
                <button type="button" class="chip" data-template="general">任务拆解</button>
                <button type="button" class="chip" data-template="explain">代码解释</button>
                <button type="button" class="chip" data-template="refactor">重构建议</button>
                <button type="button" class="chip" data-template="docs">文档生成</button>
                <button type="button" class="chip" data-template="json">JSON 输出</button>
              </div>
            </section>

            <section class="tips">
              <p class="tips-title">推荐工作流</p>
              <ul class="flow-list">
                <li>先描述目标，再补充上下文。</li>
                <li>需要稳定结果时，用结构化输出模式。</li>
                <li>业务关键内容要经过你自己的校验。</li>
              </ul>
            </section>
          </div>

          <label for="task">任务模式</label>
          <select id="task" name="task">
            <option value="general">通用开发问答</option>
            <option value="explain">代码解释</option>
            <option value="refactor">重构建议</option>
            <option value="docs">文档生成</option>
            <option value="json">结构化输出</option>
          </select>

          <label for="message">你的目标</label>
          <textarea
            id="message"
            name="message"
            rows="5"
            placeholder="例如：请帮我把这个登录模块拆成 controller / service / validator 三层，并说明迁移步骤"
            required
          ></textarea>

          <label for="context">补充上下文</label>
          <textarea
            id="context"
            name="context"
            rows="9"
            placeholder="例如：贴上接口定义、代码片段、报错日志、目录结构、限制条件等。"
          ></textarea>

          <button type="submit" id="submit-button">发送到 OpenAI</button>
        </form>

        <section class="panel">
          <h2>返回结果</h2>
          <p id="result-meta" class="result-meta">等待输入...</p>
          <pre id="result">等待输入...</pre>
        </section>
      </section>
    </main>

    <script type="module" src="./main.js"></script>
  </body>
</html>
