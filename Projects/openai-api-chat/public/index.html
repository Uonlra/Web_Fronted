<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OpenAI Project Assistant</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="hero card">
        <div>
          <p class="eyebrow">OpenAI Project Assistant</p>
          <h1> OpenAI API 项目助手</h1>
          <p class="intro">
            一个带会话历史、流式输出和任务模式的轻量开发助手。
          </p>
        </div>
        <div class="status-board">
          <div class="status-row">
            <span>服务状态</span>
            <strong id="status-ready">检查中...</strong>
          </div>
          <div class="status-row">
            <span>当前模型</span>
            <strong id="status-model">-</strong>
          </div>
          <div class="status-row">
            <span>API Key</span>
            <strong id="status-key">-</strong>
          </div>
        </div>
      </section>

      <section class="workspace">
        <aside class="sidebar card">
          <div class="sidebar-section">
            <p class="section-title">任务模式</p>
            <select id="task" name="task"></select>
          </div>

          <div class="sidebar-section">
            <p class="section-title">常用模板</p>
            <div class="chip-list">
              <button type="button" class="chip" data-template="general">任务拆解</button>
              <button type="button" class="chip" data-template="explain">代码解释</button>
              <button type="button" class="chip" data-template="refactor">重构建议</button>
              <button type="button" class="chip" data-template="docs">文档生成</button>
              <button type="button" class="chip" data-template="json">JSON 输出</button>
            </div>
          </div>

          <div class="sidebar-section">
            <p class="section-title">当前会话</p>
            <p class="muted" id="session-meta">正在初始化...</p>
            <button type="button" class="secondary-button wide-button" id="clear-session">
              清空当前会话
            </button>
          </div>

          <div class="sidebar-section">
            <p class="section-title">推荐工作流</p>
            <ul class="flow-list">
              <li>先写清目标，再补充限制和代码上下文。</li>
              <li>连续追问时，模型会沿用当前会话历史。</li>
              <li>需要稳定结构时，优先使用 JSON 模式。</li>
            </ul>
          </div>
        </aside>

        <section class="chat card">
          <div class="chat-header">
            <div>
              <p class="section-title">对话记录</p>
              <p class="muted" id="chat-meta">等待输入...</p>
            </div>
            <div class="chat-actions">
              <button type="button" class="secondary-button" id="stop-stream" disabled>
                停止生成
              </button>
            </div>
          </div>

          <div id="messages" class="messages" aria-live="polite"></div>

          <form id="chat-form" class="composer">
            <label for="message">你的目标</label>
            <textarea
              id="message"
              name="message"
              rows="4"
              placeholder="例如：请帮我把这个登录模块拆成 controller / service / validator 三层，并说明迁移步骤"
              required
            ></textarea>

            <label for="context">补充上下文</label>
            <textarea
              id="context"
              name="context"
              rows="7"
              placeholder="例如：贴上接口定义、代码片段、报错日志、目录结构、限制条件等。"
            ></textarea>

            <div class="composer-actions">
              <p class="muted" id="composer-status">准备就绪。</p>
              <button type="submit" id="submit-button">发送到 OpenAI</button>
            </div>
          </form>
        </section>
      </section>
    </main>

    <template id="message-template">
      <article class="message">
        <div class="message-top">
          <div>
            <p class="message-role"></p>
            <p class="message-task"></p>
          </div>
          <button type="button" class="copy-button" data-copy>复制</button>
        </div>
        <pre class="message-body"></pre>
        <p class="message-context"></p>
      </article>
    </template>

    <script type="module" src="./main.js"></script>
  </body>
</html>
