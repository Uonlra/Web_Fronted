<!doctype html>
<html lang="zh-Hans">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Todo App</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <button class="theme-toggle" data-theme-toggle>切换暗色</button>

    <main class="page">
      <header class="page-header">
        <h1>Todo App</h1>
        <p>简洁高效的待办事项管理</p>
      </header>

      <section class="todo-section">
        <form class="todo-form">
          <input id="todo-input" type="text" placeholder="添加新的待办事项..." />
          <button type="button">添加</button>
        </form>

        <nav class="todo-filters" data-filters>
          <button class="filter-btn active" data-filter="all">全部</button>
          <button class="filter-btn" data-filter="pending">待办</button>
          <button class="filter-btn" data-filter="done">已完成</button>
        </nav>

        <ul class="todo-list" data-todo-list></ul>

        <p class="todo-empty" data-empty-hint>还没有待办事项，添加一个吧</p>

        <footer class="todo-footer" data-footer>
          <span class="todo-counter" data-counter></span>
          <button class="clear-completed" data-clear-completed>清除已完成</button>
        </footer>
      </section>
    </main>

    <script src="./src/app.js"></script>
  </body>
</html>
