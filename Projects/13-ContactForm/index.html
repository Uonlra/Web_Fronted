<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Acme Support Contact Form</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header>
    <h1>Acme Support</h1>
    <nav aria-label="Primary navigation">
      <ul>
        <li><a href="#">Home</a></li>
        <li><a href="#">Help</a></li>
        <li><a href="#">Contact</a></li>
      </ul>
    </nav>
  </header>

  <main>
    <h2>Contact us</h2>
    <p>Send us a message and we will get back to you.</p>

    <form action="https://example.com/contact" method="post">
      <p>
        <label for="full-name">Full name</label>
        <input type="text" id="full-name" name="fullName" required>
      </p>

      <p>
        <label for="email">Email</label>
        <input type="email" id="email" name="email" required>
      </p>

      <p>
        <label for="subject">Subject</label>
        <select id="subject" name="subject" required>
          <option value="">Choose a topic</option>
          <option value="support">Support</option>
          <option value="billing">Billing</option>
          <option value="feedback">Feedback</option>
        </select>
      </p>

      <p>
        <label for="message">Message</label>
        <textarea id="message" name="message" minlength="20" required></textarea>
      </p>

      <fieldset>
        <legend>How did you hear about us?</legend>

        <p>
          <input type="radio" id="heard-search" name="heardAboutUs" value="search">
          <label for="heard-search">Search</label>
        </p>

        <p>
          <input type="radio" id="heard-friend" name="heardAboutUs" value="friend">
          <label for="heard-friend">Friend</label>
        </p>

        <p>
          <input type="radio" id="heard-social-media" name="heardAboutUs" value="social-media">
          <label for="heard-social-media">Social media</label>
        </p>
      </fieldset>

      <p>
        <input type="checkbox" id="newsletter" name="newsletter" value="yes">
        <label for="newsletter">Send me product updates</label>
      </p>

      <button type="submit">Send message</button>
    </form>
  </main>

  <footer>
    <p>&copy; 2026 Acme Support</p>
  </footer>
</body>
</html>
