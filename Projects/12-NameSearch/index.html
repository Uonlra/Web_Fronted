<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GitHub 用户搜索</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app">
      <section class="search-panel" aria-labelledby="page-title">
        <div>
          <p class="eyebrow">GitHub API</p>
          <h1 id="page-title">用户搜索工具</h1>
          <p class="intro">输入用户名片段，按模糊匹配查看 GitHub 用户结果。</p>
        </div>

        <form id="search-form" class="search-form">
          <label for="search-input">搜索关键词</label>
          <div class="search-row">
            <input
              id="search-input"
              name="query"
              type="search"
              placeholder="例如：oct、git、torvalds"
              autocomplete="off"
              required
            />
            <button type="submit">搜索</button>
          </div>
        </form>
      </section>

      <section class="results-panel" aria-live="polite">
        <div class="results-header">
          <h2>搜索结果</h2>
          <p id="status-text">还没有搜索，先输入一个关键词。</p>
        </div>
        <div id="results" class="results-grid"></div>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
